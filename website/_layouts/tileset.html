---
layout: default
---

<h1>{{ page.title }}</h1>

<link href="/assets/viewer.css" rel="stylesheet" />

<p><code>{{ page.tilejson_url }}</code></p>

{% assign atom_feed_path = page.tilejson_url | replace: 'https://tiles.openstreetmap.us', '' | replace: '.json', '.atom.xml' %}
<p>
  Last updated: <time id="tilejson-timestamp"><em>loading&hellip;</em></time>
  (<a href="{{ atom_feed_path }}">Atom feed</a>)
</p>

<div class="map-wrapper">
  <div id="map"></div>
</div>

{{ content }}

<script src="/assets/viewer.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', async function() {
    try {
      const tilejson = await fetch('{{ page.tilejson_url }}').then(r => r.json());
      const el = document.getElementById('tilejson-timestamp');
      if (tilejson.timestamp) {
        const date = new Date(tilejson.timestamp);
        const seconds = (date - Date.now()) / 1000;
        const thresholds = [
          [60, 'second'],
          [3600, 'minute'],
          [86400, 'hour'],
          [Infinity, 'day'],
        ];
        let value = seconds;
        let unit = 'second';
        for (const [limit, u] of thresholds) {
          if (Math.abs(seconds) < limit) { unit = u; break; }
          value = seconds / limit;
        }
        const rtf = new Intl.RelativeTimeFormat(undefined, { numeric: 'auto' });
        el.textContent = rtf.format(Math.round(value), unit);
        el.dateTime = date.toISOString();
        el.title = date.toLocaleString();
      } else {
        el.textContent = 'unknown';
      }
    } catch {
      document.getElementById('tilejson-timestamp').textContent = 'unavailable';
    }

    try {
      await TilesetViewer.initTilesetViewer({
        tileJsonUrl: '{{ page.tilejson_url }}',
        containerId: 'map',
        {% if page.center %}center: {{ page.center | jsonify }},{% endif %}
        {% if page.zoom %}zoom: {{ page.zoom }}{% endif %}
      });
    } catch (error) {
      console.error('Failed to initialize tileset viewer:', error);
      document.getElementById('map').innerHTML =
        '<div style="padding: 20px; color: red; text-align: center;">Failed to load tileset viewer</div>';
    }
  });
</script>
